<form #form="ngForm" (change)="modelChanged = true" accept-charset="UTF-8" role="form">
    <!-- ==================== PERSONAL INFORMATION (formId = 1) ==================== -->
    <ng-container *ngIf="personalData">
        <data-panel ngId="appInstructions" [heading]="'applicationInstructionsTitle' | l" color="portlet-blue">
            <div class="row">
                <div class="col-md-12">
                    <p style="font-size: 15px; line-height: 1.6; margin: 10px 0;">
                        {{ 'applicationInstructionsContent' | l }}
                    </p>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 col-md-offset-4" style="margin-top: 15px; margin-bottom: 10px;">
                    <button class="btn btn-green btn-block" type="button"
                        (click)="collapsePanel('appInstructions', 'idInfo')">{{ 'continue' | l }}</button>
                </div>
            </div>
        </data-panel>

        <data-panel ngId="idInfo" [heading]="'identityInformation' | l" color="portlet-blue" collapsed="true">
            <fieldset [disabled]="formLoading">
                <div class="row">
                    <!-- Left: Details Column -->
                    <div class="col-md-9">
                        <div class="row">
                            <div class="col-md-3">
                        <div class="form-group">
                            <label for="firstName">{{ 'firstName' | l }}</label>
                            <input type="text" [(ngModel)]="personalData.application.firstName" id="firstName"
                                name="firstName" class="form-control" autocomplete="off" required disabled>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <label for="lastName">{{ 'lastName' | l }}</label>
                            <input type="text" [(ngModel)]="personalData.application.lastName" id="lastName"
                                name="lastName" class="form-control" autocomplete="off" required disabled>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <label for="birthDate">{{ 'birthDate' | l }}</label>
                            <date-input id="birthDate" name="birthDate" [date]="personalData.application.birthDate"
                                [maxDate]="maxDate" (onChange)="updateDateModel($event)" autofocus></date-input>
                            <required-field-warning
                                *ngIf="validate && !personalData.application.birthDate"></required-field-warning>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <label for="birthPlace">{{ 'birthPlace' | l }}</label>
                            <input type="text" [(ngModel)]="personalData.application.birthPlace" id="birthPlace"
                                name="birthPlace" class="form-control" autocomplete="off" required>
                            <required-field-warning
                                *ngIf="validate && !personalData.application.birthPlace"></required-field-warning>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-3">
                        <div class="form-group">
                            <label for="email">{{ 'email' | l }}</label>
                            <input type="text" [(ngModel)]="personalData.application.email" id="email" name="email"
                                class="form-control" autocomplete="off" required disabled>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <label for="phone">{{ 'phone' | l }}</label>
                            <input type="text" [(ngModel)]="personalData.application.phone" id="phone" name="phone"
                                class="form-control" autocomplete="off" required>
                            <required-field-warning
                                *ngIf="validate && !personalData.application.phone"></required-field-warning>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <label for="occupation">{{ 'occupationLabel' | l }}</label>
                            <input type="text" [(ngModel)]="personalData.application.occupation" id="occupation"
                                name="occupation" class="form-control" autocomplete="off" required>
                            <required-field-warning
                                *ngIf="validate && !personalData.application.occupation"></required-field-warning>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label for="greekCitizen">{{ 'greekCitizen' | l }}</label>
                        <div class="form-group">
                            <label for="greekCitizen" class="radio-inline"><input type="radio"
                                    [(ngModel)]="personalData.application.greekCitizen" id="greekCitizen"
                                    name="greekCitizen" value="1" required>&nbsp;{{ 'yes' | l }}</label>
                            <label for="nonGreekCitizen" class="radio-inline"><input type="radio"
                                    [(ngModel)]="personalData.application.greekCitizen" id="nonGreekCitizen"
                                    name="greekCitizen" value="0" required>&nbsp;{{ 'no' | l }}</label>
                            <required-field-warning *ngIf="validate && personalData.application.greekCitizen === null"
                                [warningText]="'requiredChoice' | l"></required-field-warning>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label for="greekSsn">{{ 'greekSsn' | l }}</label><br>
                            <input type="number" [(ngModel)]="personalData.application.greekSsn"
                                [placeholder]="'greekSsnPlaceholder' | l" id="greekSsn"
                                name="greekSsn" class="form-control" autocomplete="off" minlength="9" maxlength="9"
                                required>
                            <required-field-warning
                                *ngIf="validate && !personalData.application.greekSsn"></required-field-warning>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label for="irsOffice">{{ 'irsOffice' | l }}</label><br>
                            <input type="text" [(ngModel)]="personalData.application.irsOffice" id="irsOffice"
                                name="irsOffice" class="form-control" autocomplete="off" required>
                            <required-field-warning
                                *ngIf="validate && !personalData.application.irsOffice"></required-field-warning>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div *ngIf="personalData.application.greekCitizen === '1'" class="form-group">
                            <label for="greekIdNumber">{{ 'greekIdNumber' | l }}</label><br>
                            <input type="text" [(ngModel)]="personalData.application.greekIdNumber" id="greekIdNumber"
                                name="greekIdNumber" class="form-control" autocomplete="off" required>
                            <required-field-warning
                                *ngIf="validate && !personalData.application.greekIdNumber"></required-field-warning>

                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 col-md-offset-4">
                        <button class="btn btn-green btn-block" type="button"
                            (click)="saveSection('studentPackage', 'depositInfo', 6, financialData)">{{
                            'saveAndContinue' | l }}</button>
                    </div>
                </div>
            </fieldset>
        </data-panel>

        <data-panel [hidden]="financialData.application.studentPackage === null" ngId="depositInfo"
            [heading]="'applicationProcessingFee' | l" color="portlet-blue" collapsed="true">
            <fieldset [disabled]="formLoading">
                <div class="row">
                    <div class="col-md-12">
                        <div class="form-group">
                            <label for="deposit30">{{ 'payProcessingFee' | l }}</label>
                            <div class="form-group">
                                <label for="deposit31" class="radio-inline"><input (click)="createOrder()" type="radio"
                                        [(ngModel)]="financialData.application.deposit" id="deposit31" name="deposit"
                                        value="31" required> {{ 'depositCard' | l }}</label><br>
                                <label for="deposit30" class="radio-inline"><input type="radio"
                                        [(ngModel)]="financialData.application.deposit" id="deposit30" name="deposit"
                                        value="30" required> {{ 'depositWire' | l }}</label><br>
                                <required-field-warning *ngIf="validate && !financialData.application.deposit"
                                    [warningText]="'requiredChoice' | l"></required-field-warning>
                            </div>
                        </div>
                    </div>
                </div>
                <div *ngIf="orderUrl && financialData.application.deposit === '31'" class="row">
                    <div class="col-md-4 col-md-offset-4">
                        <button class="btn btn-blue btn-block" type="button" (click)="openOrder()">{{ 'onlinePayment' | l }}</button><br>
                    </div>
                </div>
                <div *ngIf="financialData.application.deposit === '30' || financialData.application.deposit === '50'"
                    class="row">
                    <div class="col-lg-12">
                        <label>{{ 'bankDepositInstructions' | l }}</label>
                    </div>
                </div>
                <div *ngIf="financialData.application.deposit === '30' || financialData.application.deposit === '50'"
                    class="row">
                    <div class="col-lg-12">
                        <div class="portlet portlet-dark-blue">
                            <div class="portlet-heading">
                                <div class="portlet-title">
                                    <h4>{{ 'nationalBankOfGreece' | l }}</h4>
                                </div>
                                <div class="clearfix"></div>
                            </div>
                            <div class="portlet-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <label>{{ 'beneficiaryName' | l }}</label><br>{{ 'beneficiaryCompany' | l }}
                                    </div>
                                    <div class="col-md-6">
                                        <label>IBAN</label><br>GR59 0110 5310 0000 5312 0072 151
                                    </div>
                                </div>
                            </div>
                            <div class="clearfix"></div>
                        </div>
                    </div>
                    <div class="col-lg-12">
                        <div class="portlet portlet-dark-blue">
                            <div class="portlet-heading">
                                <div class="portlet-title">
                                    <h4>{{ 'eurobank' | l }}</h4>
                                </div>
                                <div class="clearfix"></div>
                            </div>
                            <div class="portlet-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <label>{{ 'beneficiaryName' | l }}</label><br>{{ 'beneficiaryCompany' | l }}
                                    </div>
                                    <div class="col-md-6">
                                        <label>IBAN</label><br>GR30 0260 0980 0009 5020 1164 291
                                    </div>
                                </div>
                            </div>
                            <div class="clearfix"></div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 col-md-offset-4">
                        <button class="btn btn-green btn-block" type="button"
                            (click)="saveSection('depositInfo', 'financialInfo', 6, financialData)">{{ 'saveAndContinue'
                            | l }}</button>
                    </div>
                </div>
            </fieldset>
        </data-panel>

        <data-panel [hidden]="financialData.application.studentPackage === null" ngId="financialInfo"
            [heading]="'financialLiability' | l" color="portlet-blue" collapsed="true">
            <fieldset [disabled]="formLoading">
                <div *ngIf="financialData.application.studentPackage === '1'" class="row">
                    <div class="col-md-12">
                        <div class="form-group">
                            <label for="financialApproval">{{ 'financialApproval1' | l }}</label><br>
                            <label for="financialApproval" class="checkbox-inline"><input type="checkbox"
                                    [(ngModel)]="financialData.application.financialApproval" id="financialApproval"
                                    name="financialApproval" autocomplete="off" required autofocus>&nbsp;{{ 'yes' | l
                                }}</label>
                            <required-field-warning *ngIf="validate && !financialData.application.financialApproval"
                                [warningText]="'requiredChoice' | l"></required-field-warning>
                        </div>
                    </div>
                </div>
                <div *ngIf="financialData.application.studentPackage === '2' || financialData.application.studentPackage === '3'"
                    class="row">
                    <div class="col-md-12">
                        <div class="form-group">
                            <label for="financialApproval">{{ 'financialApproval2' | l }}</label><br>
                            <label for="financialApproval" class="checkbox-inline"><input type="checkbox"
                                    [(ngModel)]="financialData.application.financialApproval" id="financialApproval"
                                    name="financialApproval" autocomplete="off" required autofocus>&nbsp;{{ 'yes' | l
                                }}</label>
                            <required-field-warning *ngIf="validate && !financialData.application.financialApproval"
                                [warningText]="'requiredChoice' | l"></required-field-warning>
                        </div>
                    </div>
                </div>
                <div *ngIf="financialData.application.studentPackage" class="row">
                    <div class="col-md-12">
                        <div class="form-group">
                            <label for="selfPaid">{{ 'selfPaidQuestion' | l }}</label>
                            <div class="form-group">
                                <label for="selfPaid" class="radio-inline"><input type="radio"
                                        [(ngModel)]="financialData.application.selfPaid" id="selfPaid" name="selfPaid"
                                        value="1" required>&nbsp;{{ 'yes' | l }}</label>
                                <label for="notSelfPaid" class="radio-inline"><input type="radio"
                                        [(ngModel)]="financialData.application.selfPaid" id="notSelfPaid"
                                        name="selfPaid" value="0" required>&nbsp;{{ 'no' | l }}</label>
                                <required-field-warning *ngIf="validate && financialData.application.selfPaid === null"
                                    [warningText]="'requiredChoice' | l"></required-field-warning>
                            </div>
                        </div>
                    </div>
                </div>
                <div *ngIf="financialData.application.selfPaid === '0'" class="row">
                    <div class="col-md-12">
                        <div class="form-group">
                            <label for="sponsors">{{ 'sponsors' | l }}</label>
                            <textarea [(ngModel)]="financialData.application.sponsors" id="sponsors" name="sponsors"
                                class="form-control" rows="2" autocomplete="off" required autofocus></textarea>
                            <required-field-warning
                                *ngIf="validate && !financialData.application.sponsors"></required-field-warning>
                        </div>
                    </div>
                </div>
                <div *ngIf="financialData.application.selfPaid === '0'" class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="sponsorsTotal">{{ 'sponsorsTotal' | l }}</label>
                            <input type="text" [(ngModel)]="financialData.application.sponsorsTotal" id="sponsorsTotal"
                                name="sponsorsTotal" class="form-control" autocomplete="off" required>
                            <required-field-warning
                                *ngIf="validate && !financialData.application.sponsorsTotal"></required-field-warning>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="debtApproval">{{ 'debtApproval' | l }}</label><br>
                            <label for="debtApproval" class="checkbox-inline"><input type="checkbox"
                                    [(ngModel)]="financialData.application.debtApproval" id="debtApproval"
                                    name="debtApproval" autocomplete="off" required>&nbsp;{{ 'yes' | l }}</label>
                            <required-field-warning *ngIf="validate && !financialData.application.debtApproval"
                                [warningText]="'requiredChoice' | l"></required-field-warning>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 col-md-offset-4">
                        <button class="btn btn-green btn-block" type="button"
                                (click)="saveSection('financialInfo', null, 6, financialData)">{{ 'saveAndContinue' | l }}</button>
                    </div>
                </div>
            </fieldset>
        </data-panel>
    </ng-container>

    <!-- ==================== SUBMIT & VALIDATION CONTROLS ==================== -->
    <div *ngIf="!unsavedChanges(); else isNotSaved" class="row">
        <ng-container *ngIf="form.valid; else isNotValid">
            <div class="col-md-2 col-md-offset-5 extraBottomPadding">
                <button class="btn btn-green btn-block" type="button" (click)="submitForm()"
                    [disabled]="formLoading || !form.valid">{{ 'submit' | l }}</button>
            </div>
        </ng-container>
        <ng-template #isNotValid>
            <div class="col-md-4 col-md-offset-4 extraBottomPadding">
                <button class="btn btn-green btn-block" type="button" (click)="checkForm()" [disabled]="formLoading">{{
                    'validate' | l }}</button>
            </div>
        </ng-template>
    </div>
    <ng-template #isNotSaved>
        <div class="alert alert-danger text-center extraBottomPadding">{{ 'pleaseSaveChanges' | l }}</div>
    </ng-template>
    <div *authIf="['admin', 'registrar', 'cashier', 'admissions']" class="row text-center extraBottomPadding">
        <action-button (click)="applicationService.returnToList(this.userId)" icon="fa-arrow-left" color="btn-blue"
            [caption]="'back' | l" [bTooltip]="'backToApplicants' | l"></action-button>
    </div>
</form>
