<ng-container *ngIf="personalData">
    <data-panel ngId="appInstructions" [heading]="'applicationInstructionsTitle' | l" color="portlet-blue">
        <div class="row">
            <div class="col-md-12">
                <p style="font-size: 15px; line-height: 1.6; margin: 10px 0;">
                    {{ 'applicationInstructionsContent' | l }}
                </p>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 col-md-offset-4" style="margin-top: 15px; margin-bottom: 10px;">
                <button class="btn btn-green btn-block" type="button"
                    (click)="collapsePanel('appInstructions', 'idInfo')">{{ 'continue' | l }}</button>
            </div>
        </div>
    </data-panel>

    <data-panel ngId="idInfo" [heading]="'identityInformation' | l" color="portlet-blue" collapsed="true">
        <fieldset [disabled]="formLoading">
            <div class="row">
                <!-- Left: Details Column -->
                <div class="col-md-9">
                    <div class="row">
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="firstName">{{ 'firstName' | l }}</label>
                                <input type="text" [(ngModel)]="personalData.application.firstName" id="firstName"
                                    name="firstName" class="form-control" autocomplete="off" required disabled>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="lastName">{{ 'lastName' | l }}</label>
                                <input type="text" [(ngModel)]="personalData.application.lastName" id="lastName"
                                    name="lastName" class="form-control" autocomplete="off" required disabled>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="birthDate">{{ 'birthDate' | l }}</label>
                                <date-input id="birthDate" name="birthDate" [date]="personalData.application.birthDate"
                                    [maxDate]="maxDate" (onChange)="updateDateModel($event)" autofocus></date-input>
                                <required-field-warning
                                    *ngIf="validate && !personalData.application.birthDate"></required-field-warning>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="birthPlace">{{ 'birthPlace' | l }}</label>
                                <input type="text" [(ngModel)]="personalData.application.birthPlace" id="birthPlace"
                                    name="birthPlace" class="form-control" autocomplete="off" required>
                                <required-field-warning
                                    *ngIf="validate && !personalData.application.birthPlace"></required-field-warning>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="fatherName">{{ 'fatherName' | l }}</label>
                                <input type="text" [(ngModel)]="personalData.application.fatherName" id="fatherName"
                                    name="fatherName" class="form-control" autocomplete="off" required>
                                <required-field-warning
                                    *ngIf="validate && !personalData.application.fatherName"></required-field-warning>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="motherName">{{ 'motherName' | l }}</label>
                                <input type="text" [(ngModel)]="personalData.application.motherName" id="motherName"
                                    name="motherName" class="form-control" autocomplete="off" required>
                                <required-field-warning
                                    *ngIf="validate && !personalData.application.motherName"></required-field-warning>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="email">{{ 'email' | l }}</label>
                                <input type="text" [(ngModel)]="personalData.application.email" id="email" name="email"
                                    class="form-control" autocomplete="off" required disabled>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="phone">{{ 'phone' | l }}</label>
                                <input type="text" [(ngModel)]="personalData.application.phone" id="phone" name="phone"
                                    class="form-control" autocomplete="off" required>
                                <required-field-warning
                                    *ngIf="validate && !personalData.application.phone"></required-field-warning>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="occupation">{{ 'occupationLabel' | l }}</label>
                                <input type="text" [(ngModel)]="personalData.application.occupation" id="occupation"
                                    name="occupation" class="form-control" autocomplete="off" required>
                                <required-field-warning
                                    *ngIf="validate && !personalData.application.occupation"></required-field-warning>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label for="greekCitizen">{{ 'greekCitizen' | l }}</label>
                            <div class="form-group">
                                <label for="greekCitizen" class="radio-inline"><input type="radio"
                                        [(ngModel)]="personalData.application.greekCitizen" id="greekCitizen"
                                        name="greekCitizen" value="1" required>&nbsp;{{ 'yes' | l }}</label>
                                <label for="nonGreekCitizen" class="radio-inline"><input type="radio"
                                        [(ngModel)]="personalData.application.greekCitizen" id="nonGreekCitizen"
                                        name="greekCitizen" value="0" required>&nbsp;{{ 'no' | l }}</label>
                                <required-field-warning *ngIf="validate && personalData.application.greekCitizen === null"
                                    [warningText]="'requiredChoice' | l"></required-field-warning>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12">
                            <div class="form-group">
                                <label for="familySingle">{{ 'familyStatus' | l }}</label><br>
                                <label for="familySingle" class="radio-inline"><input type="radio"
                                        [(ngModel)]="personalData.application.familyStatus" id="familySingle"
                                        name="familyStatus" value="familySingle" required>&nbsp;{{ 'maritalSingle' | l }}</label>
                                <label for="familyMarried" class="radio-inline"><input type="radio"
                                        [(ngModel)]="personalData.application.familyStatus" id="familyMarried"
                                        name="familyStatus" value="familyMarried" required>&nbsp;{{ 'maritalMarried' | l }}</label>
                                <label for="familyDivorced" class="radio-inline"><input type="radio"
                                        [(ngModel)]="personalData.application.familyStatus" id="familyDivorced"
                                        name="familyStatus" value="familyDivorced" required>&nbsp;{{ 'maritalDivorced' | l }}</label>
                                <label for="familyWidow" class="radio-inline"><input type="radio"
                                        [(ngModel)]="personalData.application.familyStatus" id="familyWidow"
                                        name="familyStatus" value="familyWidow" required>&nbsp;{{ 'maritalWidow' | l }}</label>
                                <required-field-warning *ngIf="validate && personalData.application.familyStatus === null"
                                    [warningText]="'requiredChoice' | l"></required-field-warning>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="greekSsn">{{ 'greekSsn' | l }}</label><br>
                                <input type="number" [(ngModel)]="personalData.application.greekSsn"
                                    [placeholder]="'greekSsnPlaceholder' | l" id="greekSsn"
                                    name="greekSsn" class="form-control" autocomplete="off" minlength="9" maxlength="9"
                                    required>
                                <required-field-warning
                                    *ngIf="validate && !personalData.application.greekSsn"></required-field-warning>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="irsOffice">{{ 'irsOffice' | l }}</label><br>
                                <input type="text" [(ngModel)]="personalData.application.irsOffice" id="irsOffice"
                                    name="irsOffice" class="form-control" autocomplete="off" required>
                                <required-field-warning
                                    *ngIf="validate && !personalData.application.irsOffice"></required-field-warning>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div *ngIf="personalData.application.greekCitizen === '1'" class="form-group">
                                <label for="greekIdNumber">{{ 'greekIdNumber' | l }}</label><br>
                                <input type="text" [(ngModel)]="personalData.application.greekIdNumber" id="greekIdNumber"
                                    name="greekIdNumber" class="form-control" autocomplete="off" required>
                                <required-field-warning
                                    *ngIf="validate && !personalData.application.greekIdNumber"></required-field-warning>
                                <inline-uploader [userId]="userId" [documentTypeId]="1" [files]="documentsList" [label]="'uploadIdCard' | l"></inline-uploader>
                            </div>
                        </div>
                    </div>
