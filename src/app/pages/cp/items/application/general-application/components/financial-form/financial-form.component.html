<ng-container *ngIf="financialData">
    <data-panel ngId="studentPackage" [heading]="'modeOfStudy' | l" color="portlet-blue" collapsed="true">
        <fieldset [disabled]="formLoading">
            <div class="row">
                <div class="col-md-12">
                    <div class="form-group">
                        <label for="studentPackage">{{ 'selectModeOfStudy' | l }}</label><br>
                        <label for="fullOnCampus" class="radio-inline"><input type="radio"
                                [(ngModel)]="financialData.application.studentPackage" id="fullOnCampus"
                                name="studentPackage" value="1" required> {{ 'fullOnCampus' | l }} <a
                                href="https://www.grbc.gr/program-profile/fees/" target="_new"><i
                                    class="fas fa-info-circle" aria-hidden="true"></i></a></label>
                        <label for="fullOffCampus" class="radio-inline"><input type="radio"
                                [(ngModel)]="financialData.application.studentPackage" id="fullOffCampus"
                                name="studentPackage" value="2" required> {{ 'fullOffCampus' | l }} <a
                                href="https://www.grbc.gr/program-profile/fees/" target="_new"><i
                                    class="fas fa-info-circle" aria-hidden="true"></i></a></label>
                        <label for="partTime" class="radio-inline"><input type="radio"
                                [(ngModel)]="financialData.application.studentPackage" id="partTime"
                                name="studentPackage" value="3" required> {{ 'partTime' | l }} <a
                                href="https://www.grbc.gr/program-profile/registration/special-cases/"
                                target="_new"><i class="fas fa-info-circle" aria-hidden="true"></i></a></label>
                        <required-field-warning
                            *ngIf="validate && financialData.application.studentPackage === null"
                            [warningText]="'requiredChoice' | l"></required-field-warning>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 col-md-offset-4">
                    <button class="btn btn-green btn-block" type="button"
                        (click)="onSave('studentPackage', 'depositInfo')">{{
                        'saveAndContinue' | l }}</button>
                </div>
            </div>
        </fieldset>
    </data-panel>

    <data-panel [hidden]="financialData.application.studentPackage === null" ngId="depositInfo"
        [heading]="'applicationProcessingFee' | l" color="portlet-blue" collapsed="true">
        <fieldset [disabled]="formLoading">
            <div class="row">
                <div class="col-md-12">
                    <div class="form-group">
                        <label for="deposit30">{{ 'payProcessingFee' | l }}</label><br>
                        <label for="deposit31" class="radio-inline"><input (click)="onCreateOrder()" type="radio"
                                [(ngModel)]="financialData.application.deposit" id="deposit31" name="deposit"
                                value="31" required> {{ 'depositCard' | l }}</label><br>
                        <label for="deposit30" class="radio-inline"><input type="radio"
                                [(ngModel)]="financialData.application.deposit" id="deposit30" name="deposit"
                                value="30" required> {{ 'depositWire' | l }}</label><br>
                        <required-field-warning *ngIf="validate && !financialData.application.deposit"
                            [warningText]="'requiredChoice' | l"></required-field-warning>
                    </div>
                </div>
            </div>
            <div *ngIf="orderUrl && financialData.application.deposit === '31'" class="row">
                <div class="col-md-4 col-md-offset-4">
                    <button class="btn btn-blue btn-block" type="button" (click)="onOpenOrder()">{{ 'onlinePayment' | l }}</button><br>
                </div>
            </div>
            <div *ngIf="financialData.application.deposit === '30' || financialData.application.deposit === '50'"
                class="row">
                <div class="col-lg-12">
                    <label>{{ 'bankDepositInstructions' | l }}</label>
                </div>
            </div>
            <div *ngIf="financialData.application.deposit === '30' || financialData.application.deposit === '50'"
                class="row">
                <div class="col-lg-12">
                    <div class="portlet portlet-dark-blue">
                        <div class="portlet-heading">
                            <div class="portlet-title">
                                <h4>{{ 'nationalBankOfGreece' | l }}</h4>
                            </div>
                            <div class="clearfix"></div>
                        </div>
                        <div class="portlet-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <label>{{ 'beneficiaryName' | l }}</label><br>{{ 'beneficiaryCompany' | l }}
                                </div>
                                <div class="col-md-6">
                                    <label>IBAN</label><br>GR59 0110 5310 0000 5312 0072 151
                                </div>
                            </div>
                        </div>
                        <div class="clearfix"></div>
                    </div>
                </div>
                <div class="col-lg-12">
                    <div class="portlet portlet-dark-blue">
                        <div class="portlet-heading">
                            <div class="portlet-title">
                                <h4>{{ 'eurobank' | l }}</h4>
                            </div>
                            <div class="clearfix"></div>
                        </div>
                        <div class="portlet-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <label>{{ 'beneficiaryName' | l }}</label><br>{{ 'beneficiaryCompany' | l }}
                                </div>
                                <div class="col-md-6">
                                    <label>IBAN</label><br>GR30 0260 0980 0009 5020 1164 291
                                </div>
                            </div>
                        </div>
                        <div class="clearfix"></div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 col-md-offset-4">
                    <button class="btn btn-green btn-block" type="button"
                        (click)="onSave('depositInfo', 'financialInfo')">{{ 'saveAndContinue'
                        | l }}</button>
                </div>
            </div>
        </fieldset>
    </data-panel>

    <data-panel [hidden]="financialData.application.studentPackage === null" ngId="financialInfo"
        [heading]="'financialLiability' | l" color="portlet-blue" collapsed="true">
        <fieldset [disabled]="formLoading">
            <div *ngIf="financialData.application.studentPackage === '1'" class="row">
                <div class="col-md-12">
                    <div class="form-group">
                        <label for="financialApproval">{{ 'financialApproval1' | l }}</label><br>
                        <label for="financialApproval" class="checkbox-inline"><input type="checkbox"
                                [(ngModel)]="financialData.application.financialApproval" id="financialApproval"
                                name="financialApproval" autocomplete="off" required autofocus>&nbsp;{{ 'yes' | l
                            }}</label>
                        <required-field-warning *ngIf="validate && !financialData.application.financialApproval"
                            [warningText]="'requiredChoice' | l"></required-field-warning>
                    </div>
                </div>
            </div>
            <div *ngIf="financialData.application.studentPackage === '2' || financialData.application.studentPackage === '3'"
                class="row">
                <div class="col-md-12">
                    <div class="form-group">
                        <label for="financialApproval">{{ 'financialApproval2' | l }}</label><br>
                        <label for="financialApproval" class="checkbox-inline"><input type="checkbox"
                                [(ngModel)]="financialData.application.financialApproval" id="financialApproval"
                                name="financialApproval" autocomplete="off" required autofocus>&nbsp;{{ 'yes' | l
                            }}</label>
                        <required-field-warning *ngIf="validate && !financialData.application.financialApproval"
                            [warningText]="'requiredChoice' | l"></required-field-warning>
                    </div>
                </div>
            </div>
            <div *ngIf="financialData.application.studentPackage" class="row">
                <div class="col-md-12">
                    <div class="form-group">
                        <label for="selfPaid">{{ 'selfPaidQuestion' | l }}</label><br>
                        <label for="selfPaid" class="radio-inline"><input type="radio"
                                [(ngModel)]="financialData.application.selfPaid" id="selfPaid" name="selfPaid"
                                value="1" required>&nbsp;{{ 'yes' | l }}</label>
                        <label for="notSelfPaid" class="radio-inline"><input type="radio"
                                [(ngModel)]="financialData.application.selfPaid" id="notSelfPaid"
                                name="selfPaid" value="0" required>&nbsp;{{ 'no' | l }}</label>
                        <required-field-warning *ngIf="validate && financialData.application.selfPaid === null"
                            [warningText]="'requiredChoice' | l"></required-field-warning>
                    </div>
                </div>
            </div>
            <div *ngIf="financialData.application.selfPaid === '0'" class="row">
                <div class="col-md-12">
                    <div class="form-group">
                        <label for="sponsors">{{ 'sponsors' | l }}</label>
                        <textarea [(ngModel)]="financialData.application.sponsors" id="sponsors" name="sponsors"
                            class="form-control" rows="2" autocomplete="off" required autofocus></textarea>
                        <required-field-warning
                            *ngIf="validate && !financialData.application.sponsors"></required-field-warning>
                    </div>
                </div>
            </div>
            <div *ngIf="financialData.application.selfPaid === '0'" class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="sponsorsTotal">{{ 'sponsorsTotal' | l }}</label>
                        <input type="text" [(ngModel)]="financialData.application.sponsorsTotal" id="sponsorsTotal"
                            name="sponsorsTotal" class="form-control" autocomplete="off" required>
                        <required-field-warning
                            *ngIf="validate && !financialData.application.sponsorsTotal"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="debtApproval">{{ 'debtApproval' | l }}</label><br>
                        <label for="debtApproval" class="checkbox-inline"><input type="checkbox"
                                [(ngModel)]="financialData.application.debtApproval" id="debtApproval"
                                name="debtApproval" autocomplete="off" required>&nbsp;{{ 'yes' | l }}</label>
                        <required-field-warning *ngIf="validate && !financialData.application.debtApproval"
                            [warningText]="'requiredChoice' | l"></required-field-warning>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 col-md-offset-4">
                    <button class="btn btn-green btn-block" type="button"
                            (click)="onSave('financialInfo', null)">{{ 'saveAndContinue' | l }}</button>
                </div>
            </div>
        </fieldset>
    </data-panel>
</ng-container>
