<ng-container *ngIf="referencesData">
    <data-panel ngId="firstReferenceInfo" [heading]="'recommendationLetter1' | l"
        [color]="'portlet-' + getDecisionColor(referencesData.application[0].referenceId)" collapsed="true">
        <fieldset [disabled]="formLoading">
            <div class="row">
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferenceFirstName">{{ 'firstName' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[0].firstName"
                            id="firstReferenceFirstName" name="firstReferenceFirstName" class="form-control"
                            autocomplete="off" required autofocus>
                        <required-field-warning
                            *ngIf="validate && !referencesData.application[0].firstName"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferenceLastName">{{ 'lastName' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[0].lastName"
                            id="firstReferenceLastName" name="firstReferenceLastName" class="form-control"
                            autocomplete="off" required>
                        <required-field-warning
                            *ngIf="validate && !referencesData.application[0].lastName"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferenceEmail">{{ 'email' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[0].email"
                            id="firstReferenceEmail" name="firstReferenceEmail" class="form-control"
                            autocomplete="off" required>
                        <required-field-warning
                            *ngIf="validate && !referencesData.application[0].email"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferencePhone">{{ 'phone' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[0].phone"
                            id="firstReferencePhone" name="firstReferencePhone" class="form-control"
                            autocomplete="off" required>
                        <required-field-warning
                            *ngIf="validate && !referencesData.application[0].phone"></required-field-warning>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="firstReferenceAddress">{{ 'address' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[0].address"
                            id="firstReferenceAddress" name="firstReferenceAddress" class="form-control"
                            autocomplete="off">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferenceCity">{{ 'city' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[0].city" id="firstReferenceCity"
                            name="firstReferenceCity" class="form-control" autocomplete="off">
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="form-group">
                        <label for="firstReferenceZipCode">{{ 'zipCode' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[0].zipCode"
                            id="firstReferenceZipCode" name="firstReferenceZipCode" class="form-control"
                            autocomplete="off">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferenceCountry">{{ 'country' | l }}</label>
                        <select [(ngModel)]="referencesData.application[0].country" class="form-control"
                            id="firstReferenceCountry" name="firstReferenceCountry" autocomplete="off">
                            <option *ngFor="let c of sortedCountries" [value]="c.gr">{{ isEnglish ? c.en : c.gr }}</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 col-md-offset-4">
                    <button class="btn btn-green btn-block" type="button"
                        (click)="onSave('firstReferenceInfo', 'secondReferenceInfo')">{{
                        'saveAndContinue' | l }}</button>
                </div>
            </div>
        </fieldset>
    </data-panel>

    <data-panel ngId="secondReferenceInfo" [heading]="'recommendationLetter2' | l"
        [color]="'portlet-' + getDecisionColor(referencesData.application[1].referenceId)" collapsed="true">
        <fieldset [disabled]="formLoading">
            <div class="row">
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferenceFirstName">{{ 'firstName' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[1].firstName"
                            id="secondReferenceFirstName" name="secondReferenceFirstName" class="form-control"
                            autocomplete="off" required>
                        <required-field-warning
                            *ngIf="validate && !referencesData.application[1].firstName"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferenceLastName">{{ 'lastName' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[1].lastName"
                            id="secondReferenceLastName" name="secondReferenceLastName" class="form-control"
                            autocomplete="off" required>
                        <required-field-warning
                            *ngIf="validate && !referencesData.application[1].lastName"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferenceEmail">{{ 'email' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[1].email"
                            id="secondReferenceEmail" name="secondReferenceEmail" class="form-control"
                            autocomplete="off" required>
                        <required-field-warning
                            *ngIf="validate && !referencesData.application[1].email"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferencePhone">{{ 'phone' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[1].phone"
                            id="secondReferencePhone" name="secondReferencePhone" class="form-control"
                            autocomplete="off" required>
                        <required-field-warning
                            *ngIf="validate && !referencesData.application[1].phone"></required-field-warning>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="secondReferenceAddress">{{ 'address' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[1].address"
                            id="secondReferenceAddress" name="secondReferenceAddress" class="form-control"
                            autocomplete="off">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferenceCity">{{ 'city' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[1].city" id="secondReferenceCity"
                            name="secondReferenceCity" class="form-control" autocomplete="off">
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="form-group">
                        <label for="secondReferenceZipCode">{{ 'zipCode' | l }}</label>
                        <input type="text" [(ngModel)]="referencesData.application[1].zipCode"
                            id="secondReferenceZipCode" name="secondReferenceZipCode" class="form-control"
                            autocomplete="off">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferenceCountry">{{ 'country' | l }}</label>
                        <select [(ngModel)]="referencesData.application[1].country" class="form-control"
                            id="secondReferenceCountry" name="secondReferenceCountry" autocomplete="off">
                            <option *ngFor="let c of sortedCountries" [value]="c.gr">{{ isEnglish ? c.en : c.gr }}</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 col-md-offset-4">
                    <button class="btn btn-green btn-block" type="button"
                        (click)="onSave('secondReferenceInfo', 'studentPackage')">{{
                        'saveAndContinue' | l }}</button>
                </div>
            </div>
        </fieldset>
    </data-panel>
</ng-container>
