<div class="row">
    <div class="col-lg-12">
        <div class="portlet portlet-dark-blue">
            <div class="portlet-heading">
                <div class="portlet-title">
                    <h4>Please fill out the contact information of your Pastor and of one of your teachers or professors so that we can request references.</h4>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
    
<form *ngIf="applicationData" #form="ngForm" (change)="modelChanged = true" accept-charset="UTF-8" role="form">
    <data-panel ngId="firstReferenceInfo" heading="Pastor's Contact Information" [color]="'portlet-' + getDecisionColor(applicationData.application[0].referenceId)">
        <fieldset [disabled]="formLoading">
            <div class="row">
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferenceFirstName">First Name</label>
                        <input type="text" [(ngModel)]="applicationData.application[0].firstName" id="firstReferenceFirstName" name="firstReferenceFirstName" class="form-control" autocomplete="off" required>
                        <required-field-warning *ngIf="validate && !applicationData.application[0].firstName"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferenceLastName">Last Name</label>
                        <input type="text" [(ngModel)]="applicationData.application[0].lastName" id="firstReferenceLastName" name="firstReferenceLastName" class="form-control" autocomplete="off" required>
                        <required-field-warning *ngIf="validate && !applicationData.application[0].lastName"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferenceEmail">Email</label>
                        <input type="text" [(ngModel)]="applicationData.application[0].email" id="firstReferenceEmail" name="firstReferenceEmail" class="form-control" autocomplete="off" required>
                        <required-field-warning *ngIf="validate && !applicationData.application[0].email"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferencePhone">Phone</label>
                        <input type="text" [(ngModel)]="applicationData.application[0].phone" id="firstReferencePhone" name="firstReferencePhone" class="form-control" autocomplete="off" required>
                        <required-field-warning *ngIf="validate && !applicationData.application[0].phone"></required-field-warning>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="firstReferenceAddress">Address</label>
                        <input type="text" [(ngModel)]="applicationData.application[0].address" id="firstReferenceAddress" name="firstReferenceAddress" class="form-control" autocomplete="off">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferenceCity">City, State / Province</label>
                        <input type="text" [(ngModel)]="applicationData.application[0].city" id="firstReferenceCity" name="firstReferenceCity" class="form-control" autocomplete="off">
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="form-group">
                        <label for="firstReferenceZipCode">ZIP / Postcode</label>
                        <input type="text" [(ngModel)]="applicationData.application[0].zipCode" id="firstReferenceZipCode" name="firstReferenceZipCode" class="form-control" autocomplete="off">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="firstReferenceCountry">Country</label>
                        <select [(ngModel)]="applicationData.application[0].country" class="form-control" id="firstReferenceCountry" name="firstReferenceCountry" autocomplete="off" required>
                            <option *ngFor="let c of sortedCountries" [value]="c.gr">{{ isEnglish ? c.en : c.gr }}</option>
                        </select>
                        <required-field-warning *ngIf="validate && (applicationData.application[0].country === undefined || applicationData.application[0].country === '')" [warningText]="'requiredChoice' | l"></required-field-warning>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 col-md-offset-4">
                    <button class="btn btn-green btn-block" type="button" (click)="firstReferenceInfoOnSubmit()">{{ 'saveAndContinue' | l }}</button>
                </div>
            </div>
        </fieldset>
    </data-panel>

    <data-panel ngId="secondReferenceInfo" heading="Teacher or Professor's Contact Information" [color]="'portlet-' + getDecisionColor(applicationData.application[1].referenceId)" collapsed="true">
        <fieldset [disabled]="formLoading">
            <div class="row">
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferenceFirstName">First Name</label>
                        <input type="text" [(ngModel)]="applicationData.application[1].firstName" id="secondReferenceFirstName" name="secondReferenceFirstName" class="form-control" autocomplete="off" required>
                        <required-field-warning *ngIf="validate && !applicationData.application[1].firstName"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferenceLastName">Last Name</label>
                        <input type="text" [(ngModel)]="applicationData.application[1].lastName" id="secondReferenceLastName" name="secondReferenceLastName" class="form-control" autocomplete="off" required>
                        <required-field-warning *ngIf="validate && !applicationData.application[1].lastName"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferenceEmail">Email</label>
                        <input type="text" [(ngModel)]="applicationData.application[1].email" id="secondReferenceEmail" name="secondReferenceEmail" class="form-control" autocomplete="off" required>
                        <required-field-warning *ngIf="validate && !applicationData.application[1].email"></required-field-warning>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferencePhone">Phone</label>
                        <input type="text" [(ngModel)]="applicationData.application[1].phone" id="secondReferencePhone" name="secondReferencePhone" class="form-control" autocomplete="off" required>
                        <required-field-warning *ngIf="validate && !applicationData.application[1].phone"></required-field-warning>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="secondReferenceAddress">Address</label>
                        <input type="text" [(ngModel)]="applicationData.application[1].address" id="secondReferenceAddress" name="secondReferenceAddress" class="form-control" autocomplete="off">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferenceCity">City, State / Province</label>
                        <input type="text" [(ngModel)]="applicationData.application[1].city" id="secondReferenceCity" name="secondReferenceCity" class="form-control" autocomplete="off">
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="form-group">
                        <label for="secondReferenceZipCode">ZIP / Postcode</label>
                        <input type="text" [(ngModel)]="applicationData.application[1].zipCode" id="secondReferenceZipCode" name="secondReferenceZipCode" class="form-control" autocomplete="off">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="secondReferenceCountry">Country</label>
                        <select [(ngModel)]="applicationData.application[1].country" class="form-control" id="secondReferenceCountry" name="secondReferenceCountry" autocomplete="off" required>
                            <option *ngFor="let c of sortedCountries" [value]="c.gr">{{ isEnglish ? c.en : c.gr }}</option>
                        </select>
                        <required-field-warning *ngIf="validate && (applicationData.application[1].country === undefined || applicationData.application[1].country === '')" [warningText]="'requiredChoice' | l"></required-field-warning>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 col-md-offset-4">
                    <button class="btn btn-green btn-block" type="button" (click)="secondReferenceInfoOnSubmit()">{{ 'saveAndContinue' | l }}</button>
                </div>
            </div>
        </fieldset>
    </data-panel>

    <div *ngIf="!unsavedChanges(); else isNotSaved" class="row">
        <ng-container *ngIf="form.valid; else isNotValid">
            <div class="col-md-2 col-md-offset-5 extraBottomPadding">
                <button class="btn btn-green btn-block" type="button" (click)="submitForm()" [disabled]="formLoading || !form.valid">{{ 'submit' | l }}</button>
            </div>
        </ng-container>
        <ng-template #isNotValid>
            <div class="col-md-4 col-md-offset-4 extraBottomPadding">
                <button class="btn btn-green btn-block" type="button" (click)="checkForm()" [disabled]="formLoading">{{ 'validate' | l }}</button>
            </div>
        </ng-template>
    </div>
    <ng-template #isNotSaved>
        <div class="alert alert-danger text-center extraBottomPadding">{{ 'pleaseSaveChanges' | l }}</div>
    </ng-template>
    <div *authIf="['admin', 'registrar', 'cashier', 'admissions']" class="row text-center extraBottomPadding">
        <action-button (click)="applicationService.returnToList(this.userId)" icon="fa-arrow-left" color="btn-blue" [caption]="'back' | l" [bTooltip]="'backToApplicants' | l"></action-button>
    </div>
</form>
